# .github/workflows/compliance-pdca.yml
# Automated PDCA cycle for MEOK compliance MCP server
# Runs daily at 6am UTC

name: MEOK Compliance PDCA Cycle

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'server.py'

permissions: {}

jobs:
  do-test:
    name: "DO — Test server"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install mcp pydantic httpx

      - name: Syntax check
        run: python -m py_compile server.py

      - name: Import test
        run: |
          python -c "
          import importlib.util, sys
          spec = importlib.util.spec_from_file_location('server', 'server.py')
          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)
          print('IMPORT: PASS')
          tools = [n for n in dir(mod) if not n.startswith('_') and callable(getattr(mod, n, None))]
          print(f'Functions found: {len(tools)}')
          "

      - name: Security check — no hardcoded keys
        run: |
          if grep -rn 'sk_live_\|sk_test_\|AKIA\|ghp_\|glpat-' server.py; then
            echo "::error::Hardcoded API key detected"
            exit 1
          fi
          echo "SECURITY: PASS"

  act:
    name: "ACT — Report failures"
    needs: do-test
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create issue for failures
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `PDCA Alert: Server test failure on ${new Date().toISOString().split('T')[0]}`,
              body: `## PDCA Act Phase\n\nCompliance server failed automated testing.\n\nCheck the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.\n\n**Action required:** Fix failing server before it serves incorrect compliance data.`,
              labels: ['pdca-alert', 'compliance', 'automated']
            });
