# .github/workflows/compliance-pdca.yml
# Automated PDCA cycle for all MEOK compliance MCP servers
# Runs daily at 6am UTC — checks every server, reports failures

name: MEOK Compliance PDCA Cycle

on:

permissions: {}
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:  # Manual trigger
  push:
    paths:
      - '**/server.py'

jobs:
  plan:
    name: "PLAN — Identify servers to test"
    runs-on: ubuntu-latest
    outputs:
      servers: ${{ steps.find.outputs.servers }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - id: find
        run: |
          # Find all compliance servers
          servers=$(find . -name "server.py" -path "*/mcp-marketplace/*" \
            | sed 's|/server.py||' | sed 's|.*/||' \
            | jq -R -s 'split("\n") | map(select(length > 0))' )
          echo "servers=$servers" >> $GITHUB_OUTPUT

  do-test:
    name: "DO — Test ${{ matrix.server }}"
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server: ${{ fromJson(needs.plan.outputs.servers) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install mcp pydantic httpx
      
      - name: Syntax check
        run: python -m py_compile mcp-marketplace/${{ matrix.server }}/server.py
      
      - name: Import test
        run: |
          cd mcp-marketplace/${{ matrix.server }}
          python -c "
          import importlib.util, sys
          spec = importlib.util.spec_from_file_location('server', 'server.py')
          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)
          print('IMPORT: PASS')
          # Count tools
          tools = [n for n in dir(mod) if not n.startswith('_') and callable(getattr(mod, n, None))]
          print(f'Functions found: {len(tools)}')
          "
      
      - name: Security check — no hardcoded keys
        run: |
          cd mcp-marketplace/${{ matrix.server }}
          # Check for common key patterns
          if grep -rn 'sk_live_\|sk_test_\|AKIA\|ghp_\|glpat-' server.py; then
            echo "::error::Hardcoded API key detected in ${{ matrix.server }}"
            exit 1
          fi
          echo "SECURITY: PASS"

  check:
    name: "CHECK — Aggregate results"
    needs: do-test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "=== PDCA CHECK PHASE ==="
          echo "All server tests completed."
          echo "Check individual job results for PASS/FAIL."

  act:
    name: "ACT — Report and remediate"
    needs: [do-test, check]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create issue for failures
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `PDCA Alert: Server test failures on ${new Date().toISOString().split('T')[0]}`,
              body: `## PDCA Act Phase\n\nOne or more compliance servers failed automated testing.\n\nCheck the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.\n\n**Action required:** Fix failing servers before they serve incorrect compliance data to paying customers.`,
              labels: ['pdca-alert', 'compliance', 'automated']
            });